<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>仿古交互式编钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2c1f15;
            flex-direction: column;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .title {
            color: #d4af37;
            font-size: 28px;
            margin-bottom: 30px;
        }

        /* 编钟排列 */
        .chime-group {
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        /* 单个编钟容器（放你的图片） */
        .chime {
            position: relative;
            width: 80px;       /* 你可以改大小 */
            height: auto;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        /* 你的编钟图片 */
        .chime img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 敲击动画：轻轻晃动 */
        .chime.ring {
            transform: translateY(-6px) scale(1.05);
            filter: brightness(1.3);
        }

        /* 正面点击区（上半部分） */
        .hit-area-front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 65%;
            z-index: 10;
        }

        /* 侧面点击区（下半部分） */
        .hit-area-side {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            z-index: 10;
        }

        .tips {
            color: #ccc;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1 class="title">🏮 仿古交互式编钟 🏮</h1>

    <div class="chime-group">
        <!-- 1 号编钟 -->
        <div class="chime">
            <img src="./img/sound.png" alt="编钟">
            <div class="hit-area-front" data-index="0"></div>
            <div class="hit-area-side" data-index="0"></div>
        </div>

        <!-- 2 号编钟 -->
        <div class="chime">
            <img src="你的编钟图片2.png" alt="编钟">
            <div class="hit-area-front" data-index="1"></div>
            <div class="hit-area-side" data-index="1"></div>
        </div>

        <!-- 3 号编钟 -->
        <div class="chime">
            <img src="你的编钟图片3.png" alt="编钟">
            <div class="hit-area-front" data-index="2"></div>
            <div class="hit-area-side" data-index="2"></div>
        </div>

        <!-- 4 号编钟 -->
        <div class="chime">
            <img src="你的编钟图片4.png" alt="编钟">
            <div class="hit-area-front" data-index="3"></div>
            <div class="hit-area-side" data-index="3"></div>
        </div>

        <!-- 5 号编钟 -->
        <div class="chime">
            <img src="你的编钟图片5.png" alt="编钟">
            <div class="hit-area-front" data-index="4"></div>
            <div class="hit-area-side" data-index="4"></div>
        </div>

        <!-- 6 号编钟 -->
        <div class="chime">
            <img src="你的编钟图片6.png" alt="编钟">
            <div class="hit-area-front" data-index="5"></div>
            <div class="hit-area-side" data-index="5"></div>
        </div>
    </div>

    <p class="tips">👉 点击编钟上半部分 / 下半部分 发出不同声音</p>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 播放：上半部分=高音，下半部分=低音
        function playChime(index, isFront) {
            const baseFreq = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00];
            let freq = baseFreq[index];
            if (!isFront) freq *= 0.85; // 下半部分降调

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = "sine";
            oscillator.frequency.value = freq;

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.2);
        }

        // 绑定点击
        document.querySelectorAll(".hit-area-front").forEach(el => {
            el.addEventListener("click", () => {
                const index = el.dataset.index;
                playChime(index, true);
                el.closest(".chime").classList.add("ring");
                setTimeout(() => el.closest(".chime").classList.remove("ring"), 150);
            });
        });

        document.querySelectorAll(".hit-area-side").forEach(el => {
            el.addEventListener("click", () => {
                const index = el.dataset.index;
                playChime(index, false);
                el.closest(".chime").classList.add("ring");
                setTimeout(() => el.closest(".chime").classList.remove("ring"), 150);
            });
        });
    </script>
</body>
</html>
