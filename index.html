<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./img/logo.png">
    <title>礼乐齐鲁</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "楷体", "KaiTi", "STKaiti", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: url('./img/background.png') no-repeat center center / cover;
            background-color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 1rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            background-color: #ffffff;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 2.2rem;
            color: #1d1d1f;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02rem;
        }

        .subtitle {
            font-size: 1rem;
            color: #86868b;
            font-weight: 400;
            letter-spacing: 0.01rem;
        }

        /* 6个功能区样式 */
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
            width: 100%;
            padding: 0 0.5rem;
            margin-bottom: 4rem;
        }

        .function-image {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        .function-item {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .function-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
        }

        .func-img-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .function-item img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .func-text {
            padding: 10px 5px;
            text-align: center;
            font-size: 1.5rem;
            color: #B37A55;
            font-weight: 600;
            letter-spacing: 0.05rem;
            background-color: rgba(255, 255, 255, 0);
        }
     a {
     text-decoration: none;
      }
        /* ========== 轮播样式：核心修改 - 背景图片完整显示 ========== */
        .recommend-section {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 3rem;
        }

        .recommend-title {
            font-size: 1.8rem;
            color: #1d1d1f;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02rem;
        }

        /* 轮播容器重构：添加背景层确保图片完整显示 */
        .carousel-container {
            position: relative;
            width: 100%;
            height: clamp(220px, 50vw, 400px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        /* 背景图片层：单独的层确保完整显示 */
        .carousel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 关键：使用contain确保图片完整显示 */
            background: url('./img/bar.png') no-repeat center center / contain;
            z-index: 1;
        }

        /* 轮播内容层：在背景层上方 */
        .carousel-content {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .carousel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .carousel-item.active {
            opacity: 1;
        }

        .carousel-img {
            width: 60%;
            height: 65%;
            object-fit: contain;
            margin-bottom: 1rem;
        }

        .carousel-desc {
            font-size: 1.1rem;
            color: #86868b;
            text-align: center;
            max-width: 90%;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .carousel-btn:hover {
            background: #ffffff;
            transform: translateY(-50%) scale(1.05);
        }

        .prev-btn {
            left: 12px;
        }

        .next-btn {
            right: 12px;
        }

        .carousel-indicators {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .indicator-dot.active {
            background: #1d1d1f;
            width: 24px;
            border-radius: 4px;
        }

        /* ========== 响应式适配 ========== */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .function-image {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .function-item {
                border-radius: 18px;
            }
            .func-text {
                font-size: 1rem;
            }
            .recommend-title {
                font-size: 1.5rem;
            }
            .carousel-img {
                width: 70%;
            }
            .carousel-desc {
                font-size: 1rem;
            }
        }

        @media (max-width: 375px) {
            .function-image {
                gap: 0.8rem;
            }
            .function-item {
                border-radius: 16px;
                padding-bottom: 120%;
            }
            .func-text {
                font-size: 0.9rem;
                padding: 8px 3px;
            }
            .header {
                margin-bottom: 1.5rem;
            }
            .carousel-btn {
                width: 36px;
                height: 36px;
            }
            .carousel-desc {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="./img/logo.png" alt="礼乐齐鲁logo" class="logo-img">
        </div>
        <h1>礼乐齐鲁</h1>
        <p class="subtitle">山东音乐文物数字平台</p>
    </div>

    <!-- 轮播区域：重构结构确保背景完整显示 -->
    <section class="recommend-section">
        <div class="carousel-container">
            <!-- 背景图片层：单独分层确保完整显示 -->
            <div class="carousel-bg"></div>
            
            <!-- 轮播内容层 -->
            <div class="carousel-content">
                <div class="carousel-item active">
                    <img src="./img/index1.png" alt="日照东海峪陶响器" class="carousel-img">
                    <p class="carousel-desc">日照东海峪陶响器 - 再现礼乐华章，精准还原古乐音律</p>
                </div>
                <div class="carousel-item">
                    <img src="./img/index2.png" alt="莒县陵阳河陶角" class="carousel-img">
                    <p class="carousel-desc">莒县陵阳河陶角 - 莒县陵阳河大汶口文化晚期墓葬，远古乐音载体</p>
                </div>
                <div class="carousel-item">
                    <img src="./img/index3.png" alt="潍坊姚官庄陶埙" class="carousel-img">
                    <p class="carousel-desc">潍坊姚官庄陶埙 - 山东潍坊市姚官庄遗址出土，见证龙山文化</p>
                </div>
                <button class="carousel-btn prev-btn">&lt;</button>
                <button class="carousel-btn next-btn">&gt;</button>

                <div class="carousel-indicators">
                    <span class="indicator-dot active" data-index="0"></span>
                    <span class="indicator-dot" data-index="1"></span>
                    <span class="indicator-dot" data-index="2"></span>
                </div>
            </div>
        </div>
    </section>

    <!-- 6个功能区 -->
    <div class="grid-container">
        <div class="function-image">
            <a href="./today.html" class="function-item">
                <div class="func-img-wrapper">
                    <img src="./img/fun1.png" alt="今日文物">
                </div>
                <div class="func-text">今日文物</div>
            </a>
            <a href="./details.html" class="function-item">
                <div class="func-img-wrapper">
                    <img src="./img/fun2.png" alt="文物图谱">
                </div>
                <div class="func-text">文物图谱</div>
            </a>
            <a href="./test.html" class="function-item">
                <div class="func-img-wrapper">
                    <img src="./img/fun3.png" alt="个性之声">
                </div>
                <div class="func-text">个性之声</div>
            </a>
            <a href="#circle" class="function-item">
                <div class="func-img-wrapper">
                    <img src="./img/fun4.png" alt="知音圈">
                </div>
                <div class="func-text">知音圈</div>
            </a>
            <a href="#music" class="function-item">
                <div class="func-img-wrapper">
                    <img src="./img/fun5.png" alt="礼乐重闻">
                </div>
                <div class="func-text">礼乐重闻</div>
            </a>
            <a href="./shop.html" class="function-item">
                <div class="func-img-wrapper">
                    <img src="./img/fun6.png" alt="线上商城">
                </div>
                <div class="func-text">线上商城</div>
            </a>
        </div>
    </div>

    <script>
        // 轮播交互逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const carouselItems = document.querySelectorAll('.carousel-item');
            const indicators = document.querySelectorAll('.indicator-dot');
            const prevBtn = document.querySelector('.prev-btn');
            const nextBtn = document.querySelector('.next-btn');
            let currentIndex = 0;
            const autoPlayInterval = 5000;
            let autoPlayTimer;

            function switchCarousel(index) {
                carouselItems.forEach(item => item.classList.remove('active'));
                indicators.forEach(dot => dot.classList.remove('active'));
                
                if (index >= carouselItems.length) currentIndex = 0;
                else if (index < 0) currentIndex = carouselItems.length - 1;
                else currentIndex = index;
                
                carouselItems[currentIndex].classList.add('active');
                indicators[currentIndex].classList.add('active');
            }

            function nextSlide() { switchCarousel(currentIndex + 1); }
            function prevSlide() { switchCarousel(currentIndex - 1); }

            indicators.forEach(dot => {
                dot.addEventListener('click', function() {
                    switchCarousel(parseInt(this.dataset.index));
                    resetAutoPlay();
                });
            });

            prevBtn.addEventListener('click', () => { prevSlide(); resetAutoPlay(); });
            nextBtn.addEventListener('click', () => { nextSlide(); resetAutoPlay(); });

            function startAutoPlay() {
                autoPlayTimer = setInterval(nextSlide, autoPlayInterval);
            }
            function resetAutoPlay() {
                clearInterval(autoPlayTimer);
                startAutoPlay();
            }
            startAutoPlay();

            const carouselContainer = document.querySelector('.carousel-container');
            carouselContainer.addEventListener('mouseenter', () => clearInterval(autoPlayTimer));
            carouselContainer.addEventListener('mouseleave', () => startAutoPlay());
        });
    </script>
</body>
</html>
