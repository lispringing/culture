<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>礼乐齐鲁文创商城</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
        }

        /* 页面背景 - 替换为实际背景图路径 */
        body {
            background: url("./img/background.png") no-repeat fixed center/cover;
            background-color: #f8f9fa; /* 背景图加载失败时的兜底色 */
            color: #333;
            min-height: 100vh;
            padding: 20px 0 50px;
            position: relative;
        }

        /* 背景遮罩层 - 提升文字可读性 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        /* 圆形返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #8c3f21;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            z-index: 90;
            transition: background-color 0.3s ease;
        }

        .back-btn:hover {
            background-color: #703018;
        }

        /* 商品列表容器 */
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-top: 20px;
        }

        /* 商品卡片样式 */
        .product-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #f5f5f5;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 16px;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-desc {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .product-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #e63946;
        }

        .original-price {
            font-size: 12px;
            color: #999;
            text-decoration: line-through;
            margin-left: 5px;
        }

        /* 新增购买按钮样式 */
        .buy-btn {
            width: 100%;
            padding: 8px 0;
            margin-top: 12px;
            background-color: #e63946;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .buy-btn:hover {
            background-color: #d12f3c;
        }

        /* 弹窗内购买按钮样式 */
        .modal-buy-btn {
            width: 100%;
            padding: 12px 0;
            margin-top: 20px;
            background-color: #e63946;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .modal-buy-btn:hover {
            background-color: #d12f3c;
        }

        /* 商品详情弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #fff;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-modal:hover {
            color: #333;
        }

        .modal-product-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .modal-product-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-product-price {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-price {
            font-size: 28px;
            font-weight: bold;
            color: #e63946;
        }

        .modal-original-price {
            font-size: 16px;
            color: #999;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .modal-product-desc {
            font-size: 16px;
            line-height: 1.8;
            color: #666;
            margin-bottom: 20px;
        }

        .modal-product-detail {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* 响应式适配 - 移动端 */
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }

            .product-img {
                height: 150px;
            }

            .product-title {
                font-size: 14px;
            }

            .price {
                font-size: 16px;
            }

            .modal-product-title {
                font-size: 20px;
            }

            .modal-price {
                font-size: 24px;
            }

            .modal-product-desc {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .product-container {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .product-card {
                border-radius: 8px;
            }

            .product-info {
                padding: 10px;
            }

            .product-desc {
                display: none; /* 移动端隐藏商品描述，节省空间 */
            }

            .back-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .modal-content {
                padding: 20px 15px;
            }

            .buy-btn {
                padding: 6px 0;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 圆形返回按钮 -->
    <button class="back-btn">←</button>

    <!-- 商品列表 -->
    <div class="product-container">
        <!-- 商品1 - 古乐器元素便签本 -->
        <div class="product-card" data-product='{
            "title": "古乐器元素便签本",
            "img": "./img/product/1.png",
            "price": "¥29.9",
            "originalPrice": "¥49.9",
            "desc": "以曾侯乙编钟为设计灵感的便签本，复古纹样，便携实用，文创小物",
            "detail": "1. 材质：优质牛皮纸封面+米黄内页，质感佳；2. 尺寸：10cm×15cm，便携口袋款；3. 设计：封面烫金编钟纹样，内页带古乐器插画；4. 页数：80张/本，可撕设计；5. 适用场景：日常记录、学生文具、文创礼品、办公使用。"
        }'>
            <img src="./img/product/1.png" alt="古乐器元素便签本" class="product-img">
            <div class="product-info">
                <h3 class="product-title">古乐器元素便签本</h3>
                <p class="product-desc">以曾侯乙编钟为设计灵感的便签本，复古纹样，便携实用，文创小物</p>
                <div class="product-price">
                    <div>
                        <span class="price">¥29.9</span>
                        <span class="original-price">¥49.9</span>
                    </div>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品2 - 礼乐文化印章套装 -->
        <div class="product-card" data-product='{
            "title": "礼乐文化印章套装",
            "img": "./img/product/2.png",
            "price": "¥39.9",
            "originalPrice": "¥69.9",
            "desc": "山东汉画像石乐舞主题印章，6枚装，黄铜材质，可定制刻字，文创礼品",
            "detail": "1. 材质：黄铜材质，耐磨不易氧化；2. 规格：单枚印章直径2cm，高度6cm；3. 图案：精选汉画像石乐舞、宴饮等6种传统纹样；4. 工艺：激光雕刻，字迹清晰，手感厚重；5. 包装：精美礼盒包装，配印泥；6. 适用场景：书法篆刻、文创收藏、伴手礼、学生奖品。"
        }'>
            <img src="./img/product/2.png" alt="礼乐文化印章套装" class="product-img">
            <div class="product-info">
                <h3 class="product-title">礼乐文化印章套装</h3>
                <p class="product-desc">山东汉画像石乐舞主题印章，6枚装，黄铜材质，可定制刻字，文创礼品</p>
                <div class="product-price">
                    <div>
                        <span class="price">¥39.9</span>
                        <span class="original-price">¥69.9</span>
                    </div>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品3 - 青铜雅韵文件夹 -->
        <div class="product-card" data-product='{
            "title": "青铜雅韵文件夹",
            "img": "./img/product/3.png",
            "price": "¥19.9",
            "originalPrice": "¥39.9",
            "desc": "仿青铜纹样设计文件夹，防水耐磨，A4尺寸，办公收纳文创用品",
            "detail": "1. 材质：加厚PP材质，防水防撕裂；2. 规格：A4标准尺寸，可容纳50张A4纸；3. 设计：封面仿青铜编钟纹样，烫金工艺；4. 功能：带分类标签，侧边插袋设计；5. 颜色：复古青铜色，质感高级；6. 适用场景：办公收纳、学生整理、文创收藏。"
        }'>
            <img src="./img/product/3.png" alt="青铜雅韵文件夹" class="product-img">
            <div class="product-info">
                <h3 class="product-title">青铜雅韵文件夹</h3>
                <p class="product-desc">仿青铜纹样设计文件夹，防水耐磨，A4尺寸，办公收纳文创用品</p>
                <div class="product-price">
                    <div>
                        <span class="price">¥19.9</span>
                        <span class="original-price">¥39.9</span>
                    </div>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>
    </div>

    <!-- 商品详情弹窗 -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <img src="" alt="" class="modal-product-img">
            <h2 class="modal-product-title"></h2>
            <div class="modal-product-price">
                <span class="modal-price"></span>
                <span class="modal-original-price"></span>
            </div>
            <div class="modal-product-desc"></div>
            <div class="modal-product-detail"></div>
            <button class="modal-buy-btn">立即购买</button>
        </div>
    </div>

    <script>
        // 返回按钮点击事件
        const backBtn = document.querySelector('.back-btn');
        backBtn.addEventListener('click', () => {
            window.history.back();
        });

        // 缺货提示函数
        function showStockOutTip() {
            alert('抱歉，该商品暂时缺货，敬请期待！');
        }

        // 绑定所有购买按钮的点击事件
        const allBuyBtns = document.querySelectorAll('.buy-btn, .modal-buy-btn');
        allBuyBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); // 阻止冒泡（避免触发商品弹窗打开）
                showStockOutTip();
            });
        });

        // 商品详情弹窗相关
        const modal = document.getElementById('productModal');
        const closeModalBtn = document.querySelector('.close-modal');
        const productCards = document.querySelectorAll('.product-card');

        // 打开弹窗
        productCards.forEach(card => {
            card.addEventListener('click', () => {
                // 获取商品数据
                const productData = JSON.parse(card.dataset.product);
                
                // 填充弹窗内容
                document.querySelector('.modal-product-img').src = productData.img;
                document.querySelector('.modal-product-img').alt = productData.title;
                document.querySelector('.modal-product-title').textContent = productData.title;
                document.querySelector('.modal-price').textContent = productData.price;
                document.querySelector('.modal-original-price').textContent = productData.originalPrice;
                document.querySelector('.modal-product-desc').textContent = productData.desc;
                document.querySelector('.modal-product-detail').innerHTML = productData.detail.replace(/;/g, '<br>');
                
                // 显示弹窗
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        // 关闭弹窗
        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
